<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音数据追踪 - 实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .status-bar {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .refresh-btn {
            background: #B388EB;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .refresh-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .insights {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .insight-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .insight-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .insight-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .ranking-table th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #667eea;
        }
        
        .ranking-table td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .ranking-table tr:hover {
            background: #f8f9fa;
        }
        
        .rank-badge {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border-radius: 50%;
            font-weight: bold;
            color: white;
        }
        
        .rank-1 { background: #FFD700; }
        .rank-2 { background: #C0C0C0; }
        .rank-3 { background: #CD7F32; }
        .rank-other { background: #667eea; }
        
        #loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 抖音数据追踪</h1>
            <p>实时监控 · 智能分析</p>
        </div>
        
        <div class="status-bar">
            <div id="status">正在加载...</div>
            <button class="refresh-btn" onclick="loadData(true)" id="refreshBtn">🔄 手动刷新</button>
        </div>
        
        <div id="loading">⏳ 正在加载数据...</div>
        
        <div class="card" id="insights-card" style="display:none;">
            <h2>📈 数据概览</h2>
            <div class="insights" id="insights"></div>
        </div>
        
        <div class="card" id="ranking-card" style="display:none;">
            <h2>🏆 增长排行榜</h2>
            <table class="ranking-table" id="ranking"></table>
        </div>
    </div>
    
    <script>
        let allData = [];
        let lastUpdate = null;
        let manualRefreshCount = 0;
        const MAX_MANUAL_REFRESH = 2;
        const AUTO_REFRESH_INTERVAL = 6 * 60 * 60 * 1000; // 6小时
        
        async function loadData(isManual = false) {
            if (isManual) {
                const today = new Date().toDateString();
                const savedDate = localStorage.getItem('refreshDate');
                const savedCount = parseInt(localStorage.getItem('refreshCount') || '0');
                
                if (savedDate === today) {
                    manualRefreshCount = savedCount;
                } else {
                    manualRefreshCount = 0;
                    localStorage.setItem('refreshDate', today);
                }
                
                if (manualRefreshCount >= MAX_MANUAL_REFRESH) {
                    alert('❌ 今日手动刷新次数已用完（2/2）');
                    return;
                }
                
                manualRefreshCount++;
                localStorage.setItem('refreshCount', manualRefreshCount);
                updateRefreshButton();
            }
            
            try {
                const response = await fetch(`data.csv?t=${Date.now()}`);
                const text = await response.text();
                
                // 手动解析 CSV
                const lines = text.trim().split('\n');
                const headers = lines[0].split(',');
                
                allData = lines.slice(1).map(line => {
                    const values = line.split(',');
                    const obj = {};
                    headers.forEach((header, i) => {
                        obj[header] = values[i];
                    });
                    
                    // 转换数据类型
                    obj.play_count = parseInt(obj.play_count) || 0;
                    obj.digg_count = parseInt(obj.digg_count) || 0;
                    obj.comment_count = parseInt(obj.comment_count) || 0;
                    obj.share_count = parseInt(obj.share_count) || 0;
                    obj.growth6h = obj.play_count; // 简化：用播放量作为增长指标
                    obj.author = obj.author || '未知';
                    obj.tags = obj.title ? obj.title.match(/#[^\s#]+/g)?.join(' ') || '' : '';
                    
                    return obj;
                });
                
                lastUpdate = new Date();
                localStorage.setItem('lastUpdate', lastUpdate.toISOString());
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('insights-card').style.display = 'block';
                document.getElementById('ranking-card').style.display = 'block';
                
                updateStatus();
                renderInsights();
                renderRanking();
            } catch (error) {
                document.getElementById('loading').innerHTML = '❌ 加载失败: ' + error.message;
                console.error(error);
            }
        }
        
        function updateStatus() {
            const now = new Date();
            const lastUpdateTime = lastUpdate || new Date(localStorage.getItem('lastUpdate') || Date.now());
            const diff = Math.floor((now - lastUpdateTime) / 1000 / 60);
            const nextRefreshMin = Math.max(0, 360 - diff);
            const nextRefreshHour = Math.floor(nextRefreshMin / 60);
            const nextRefreshMinRem = nextRefreshMin % 60;
            
            const lastUpdateStr = lastUpdateTime.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const nextRefreshStr = nextRefreshHour > 0 
                ? `${nextRefreshHour}小时${nextRefreshMinRem}分钟后`
                : `${nextRefreshMinRem}分钟后`;
            
            document.getElementById('status').innerHTML = 
                `上次刷新：${lastUpdateStr} | 下次自动刷新：${nextRefreshStr}`;
        }
        
        function updateRefreshButton() {
            const today = new Date().toDateString();
            const savedDate = localStorage.getItem('refreshDate');
            const savedCount = parseInt(localStorage.getItem('refreshCount') || '0');
            
            if (savedDate === today) {
                manualRefreshCount = savedCount;
            } else {
                manualRefreshCount = 0;
            }
            
            const btn = document.getElementById('refreshBtn');
            if (manualRefreshCount >= MAX_MANUAL_REFRESH) {
                btn.disabled = true;
                btn.textContent = `🔄 已用完（${manualRefreshCount}/${MAX_MANUAL_REFRESH}）`;
            } else {
                btn.disabled = false;
                btn.textContent = `🔄 手动刷新（${manualRefreshCount}/${MAX_MANUAL_REFRESH}）`;
            }
        }
        
        function renderInsights() {
            const totalViews = allData.reduce((sum, v) => sum + v.play_count, 0);
            const totalLikes = allData.reduce((sum, v) => sum + v.digg_count, 0);
            const avgViews = Math.floor(totalViews / allData.length);
            
            document.getElementById('insights').innerHTML = `
                <div class="insight-item">
                    <div class="insight-label">总播放量</div>
                    <div class="insight-value">${(totalViews / 10000).toFixed(1)}万</div>
                </div>
                <div class="insight-item">
                    <div class="insight-label">总点赞数</div>
                    <div class="insight-value">${(totalLikes / 10000).toFixed(1)}万</div>
                </div>
                <div class="insight-item">
                    <div class="insight-label">平均播放</div>
                    <div class="insight-value">${(avgViews / 10000).toFixed(1)}万</div>
                </div>
                <div class="insight-item">
                    <div class="insight-label">作品数量</div>
                    <div class="insight-value">${allData.length}</div>
                </div>
            `;
        }
        
        function renderRanking() {
            const sorted = [...allData].sort((a, b) => b.growth6h - a.growth6h).slice(0, 20);
            
            const rows = sorted.map((v, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
                return `
                    <tr>
                        <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
                        <td>${v.title || '无标题'}</td>
                        <td>${v.author}</td>
                        <td>${(v.play_count / 10000).toFixed(1)}万</td>
                        <td>${(v.digg_count / 10000).toFixed(1)}万</td>
                        <td>${v.comment_count}</td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('ranking').innerHTML = `
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>标题</th>
                        <th>作者</th>
                        <th>播放量</th>
                        <th>点赞数</th>
                        <th>评论数</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            `;
        }
        
        // 自动刷新
        setInterval(() => {
            const now = new Date();
            const lastUpdateTime = lastUpdate || new Date(localStorage.getItem('lastUpdate') || Date.now());
            if (now - lastUpdateTime >= AUTO_REFRESH_INTERVAL) {
                loadData(false);
            }
            updateStatus();
        }, 60000); // 每分钟更新一次状态
        
        // 初始化
        updateRefreshButton();
        loadData(false);
    </script>
</body>
</html>
