<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角洲陪玩 · 爆款超车小工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #FAF7FF 0%, #E9D5FF 100%);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* 顶部固定栏 */
        .header {
            position: sticky;
            top: 0;
            background: rgba(250, 247, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(179, 136, 235, 0.15);
            z-index: 100;
            border-radius: 0 0 25px 25px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .title {
            font-size: 1.4em;
            font-weight: 800;
            color: #B388EB;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .refresh-btn {
            background: #B388EB;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(179, 136, 235, 0.3);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(179, 136, 235, 0.4);
        }
        
        .status-bar {
            font-size: 0.85em;
            color: #B388EB;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* 核心结论看板 */
        .insights {
            margin: 20px;
            background: linear-gradient(135deg, #E9D5FF 0%, #D8B4FE 100%);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(179, 136, 235, 0.2);
        }
        
        .insight-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(179, 136, 235, 0.1);
        }
        
        .insight-item:last-child { margin-bottom: 0; }
        
        .insight-label {
            font-size: 0.85em;
            color: #B388EB;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .insight-value {
            font-size: 1.05em;
            color: #333;
            font-weight: 700;
            line-height: 1.5;
        }
        
        /* 操作区 */
        .actions {
            margin: 20px;
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(179, 136, 235, 0.15);
        }
        
        .input-box {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #E9D5FF;
            border-radius: 20px;
            font-size: 1em;
            background: #FAF7FF;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        
        .input-box:focus {
            outline: none;
            border-color: #B388EB;
            box-shadow: 0 0 0 4px rgba(179, 136, 235, 0.1);
        }
        
        .add-btn {
            width: 100%;
            background: #B388EB;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 20px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(179, 136, 235, 0.3);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(179, 136, 235, 0.4);
        }
        
        /* 排名列表 */
        .ranking {
            margin: 20px;
        }
        
        .ranking-header {
            display: grid;
            grid-template-columns: 50px 1fr 100px 80px;
            gap: 10px;
            padding: 12px 15px;
            font-size: 0.85em;
            font-weight: 700;
            color: #B388EB;
            background: rgba(233, 213, 255, 0.5);
            border-radius: 20px 20px 0 0;
        }
        
        .ranking-item {
            display: grid;
            grid-template-columns: 50px 1fr 100px 80px;
            gap: 10px;
            padding: 15px;
            background: white;
            margin-bottom: 10px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(179, 136, 235, 0.1);
            align-items: center;
            transition: all 0.3s;
        }
        
        .ranking-item:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(179, 136, 235, 0.2);
        }
        
        .ranking-item.top3 {
            background: linear-gradient(135deg, #FAF7FF 0%, #E9D5FF 100%);
        }
        
        .rank {
            font-size: 1.2em;
            font-weight: 800;
            color: #B388EB;
            text-align: center;
        }
        
        .rank.medal::before {
            font-size: 1.5em;
            margin-right: 4px;
        }
        
        .rank.medal-1::before { content: "🥇"; }
        .rank.medal-2::before { content: "🥈"; }
        .rank.medal-3::before { content: "🥉"; }
        
        .video-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .video-title {
            font-size: 0.95em;
            font-weight: 600;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .video-highlight {
            font-size: 0.8em;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .growth-value {
            font-size: 1.1em;
            font-weight: 800;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        
        .growth-value.positive {
            color: #36D399;
        }
        
        .growth-value.negative {
            color: #F87272;
        }
        
        .view-btn {
            background: #E9D5FF;
            color: #B388EB;
            border: none;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .view-btn:hover {
            background: #B388EB;
            color: white;
        }
        
        .loading {
            text-align: center;
            color: #B388EB;
            font-size: 1.2em;
            padding: 50px 20px;
            font-weight: 600;
        }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            .ranking-header {
                grid-template-columns: 40px 1fr 90px 70px;
                font-size: 0.75em;
                padding: 10px;
            }
            
            .ranking-item {
                grid-template-columns: 40px 1fr 90px 70px;
                padding: 12px 10px;
            }
            
            .title {
                font-size: 1.1em;
            }
            
            .video-title {
                font-size: 0.85em;
            }
            
            .video-highlight {
                font-size: 0.75em;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部固定栏 -->
    <div class="header">
        <div class="header-top">
            <div class="title">
                <span>🎮</span>
                <span>三角洲陪玩 · 爆款超车小工具</span>
            </div>
            <button class="refresh-btn" onclick="loadData()">
                <span>🔄</span>
                <span>刷新</span>
            </button>
        </div>
        <div class="status-bar">
            <span>⏰</span>
            <span id="status">加载中...</span>
        </div>
    </div>
    
    <!-- 核心结论看板 -->
    <div class="insights" id="insights"></div>
    
    <!-- 操作区 -->
    <div class="actions">
        <input type="text" class="input-box" placeholder="粘贴抖音作品链接呀" id="urlInput">
        <button class="add-btn" onclick="addVideo()">
            <span>➕</span>
            <span>添加监控</span>
        </button>
    </div>
    
    <!-- 排名列表 -->
    <div class="ranking">
        <div class="ranking-header">
            <div>排名</div>
            <div>账号 / 爆点</div>
            <div>6h增长</div>
            <div>操作</div>
        </div>
        <div id="rankingList"></div>
    </div>
    
    <div class="loading" id="loading">加载中...</div>

    <script>
        let allData = [];
        let lastUpdate = null;
        
        async function loadData() {
            try {
                const response = await fetch(`data.json?t=${Date.now()}`);
                const json = await response.json();
                allData = json.videos || json;
                lastUpdate = new Date();
                
                document.getElementById('loading').style.display = 'none';
                updateStatus();
                renderInsights();
                renderRanking();
            } catch (error) {
                document.getElementById('loading').innerHTML = '❌ 加载失败';
                console.error(error);
            }
        }
        
        function updateStatus() {
            const now = new Date();
            const diff = Math.floor((now - lastUpdate) / 1000 / 60);
            const nextUpdate = 360 - (diff % 360);
            document.getElementById('status').innerHTML = 
                `上次刷新：${diff}分钟前 · 下次自动刷新：${nextUpdate}分钟后`;
        }
        
        function renderInsights() {
            // 计算核心结论
            const sorted = [...allData].sort((a, b) => (b.growth6h || 0) - (a.growth6h || 0));
            const topVideo = sorted[0];
            
            // 提取高频标签
            const tagCount = {};
            allData.forEach(v => {
                if (v.tags) {
                    v.tags.split(/[,，、]/).forEach(tag => {
                        tag = tag.trim();
                        if (tag) tagCount[tag] = (tagCount[tag] || 0) + 1;
                    });
                }
            });
            const topTags = Object.entries(tagCount)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([tag]) => tag);
            
            // 统计发布时段
            const hourCount = {};
            allData.forEach(v => {
                if (v.publishAt) {
                    const hour = new Date(v.publishAt).getHours();
                    hourCount[hour] = (hourCount[hour] || 0) + 1;
                }
            });
            const bestHour = Object.entries(hourCount)
                .sort((a, b) => b[1] - a[1])[0];
            
            document.getElementById('insights').innerHTML = `
                <div class="insight-item">
                    <div class="insight-label">🔥 今日必抄爆款</div>
                    <div class="insight-value">${topVideo?.author || '暂无'} - ${extractHighlight(topVideo)}</div>
                </div>
                <div class="insight-item">
                    <div class="insight-label">🏷️ 必带爆款标签</div>
                    <div class="insight-value">${topTags.join(' · ') || '暂无'}</div>
                </div>
                <div class="insight-item">
                    <div class="insight-label">⏰ 最佳发布时间</div>
                    <div class="insight-value">${bestHour ? `${bestHour[0]}:00 - ${parseInt(bestHour[0])+1}:00` : '暂无'}</div>
                </div>
            `;
        }
        
        function extractHighlight(video) {
            if (!video) return '暂无数据';
            const title = video.title || '';
            // 简单提取：取前20字或第一个句号前的内容
            const short = title.split(/[。！？]/)[0].slice(0, 20);
            return short || '查看原视频';
        }
        
        function renderRanking() {
            const sorted = [...allData].sort((a, b) => (b.growth6h || 0) - (a.growth6h || 0));
            
            const html = sorted.map((video, index) => {
                const rank = index + 1;
                const growth = video.growth6h || 0;
                const isPositive = growth > 0;
                const medalClass = rank <= 3 ? `medal medal-${rank}` : '';
                const top3Class = rank <= 3 ? 'top3' : '';
                
                return `
                    <div class="ranking-item ${top3Class}">
                        <div class="rank ${medalClass}">${rank}</div>
                        <div class="video-info">
                            <div class="video-title">${video.author || '未知账号'}</div>
                            <div class="video-highlight">${extractHighlight(video)}</div>
                        </div>
                        <div class="growth-value ${isPositive ? 'positive' : 'negative'}">
                            ${isPositive ? '↑' : '↓'} ${Math.abs(growth).toLocaleString()}
                        </div>
                        <button class="view-btn" onclick="window.open('${video.url}', '_blank')">查看</button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('rankingList').innerHTML = html;
        }
        
        function addVideo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('请输入抖音链接');
                return;
            }
            alert('添加功能需要后端支持，当前为演示版本');
            document.getElementById('urlInput').value = '';
        }
        
        // 初始加载
        loadData();
        
        // 每分钟更新状态栏
        setInterval(updateStatus, 60000);
        
        // 每6小时自动刷新
        setInterval(loadData, 6 * 60 * 60 * 1000);
    </script>
</body>
</html>
