name: 抖音监控

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行
  workflow_dispatch:  # 手动触发

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install requests
      
      - name: 查询数据
        env:
          DY_INPUT_FILE: douyin_input.txt
        run: |
          python douyin_fast_fetch.py
      
      - name: 提交数据
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "数据更新 $(date '+%Y-%m-%d %H:%M')"
          git push
